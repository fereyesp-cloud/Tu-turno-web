<header class="encabezado" id="inicio">
  <div class="contenedor encabezado-contenido">
    <h1>Login - Tu turno web</h1>
    <p>Bienvenido a Tu Turno Web</p>
    <a routerLink="/registro" class="boton-principal">Registrarse</a>
  </div>
</header>

<main>
  <section class="login">
    <div class="contenedor">
      <h2>Login</h2>
      <form [formGroup]="formularioLogin" (ngSubmit)="ingresar()">
        <div class="mb-3">
          <label class="form-label">Nombre de usuario</label>
          <input type="text" class="form-control" formControlName="username" placeholder="Usuario"
            [class.is-invalid]="formularioLogin.get('username')?.invalid && formularioLogin.get('username')?.touched">
          <div class="invalid-feedback">El nombre de usuario es obligatorio</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <div class="input-group">
            <input [type]="verContrasena ? 'text' : 'password'" class="form-control" formControlName="contrasena" placeholder="Contraseña"
              [class.is-invalid]="formularioLogin.get('contrasena')?.invalid && formularioLogin.get('contrasena')?.touched">
            <button type="button" class="btn btn-outline-secondary" (click)="toggleVerContrasena()">👁</button>
          </div>
          <div class="text-danger small"
            *ngIf="formularioLogin.get('contrasena')?.invalid && formularioLogin.get('contrasena')?.touched">
            La contraseña es obligatoria
          </div>
        </div>
        <div class="alert alert-danger" *ngIf="mensajeError">{{ mensajeError }}</div>
        <button type="submit" class="btn btn-primary">Ingresar</button>
        <a routerLink="/recuperar-contrasena" class="btn btn-secondary ms-2">Recuperar contraseña</a>
      </form>
    </div>
  </section>
</main>

<footer class="pie-pagina">
  <p>© 2026 Tu turno Web — Ejemplo académico DSY2202</p>
</footer>
