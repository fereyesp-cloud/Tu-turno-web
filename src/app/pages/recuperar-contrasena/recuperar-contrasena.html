<header class="encabezado" id="inicio">
  <div class="contenedor encabezado-contenido">
    <h1>Tu turno web</h1>
    <p>Bienvenido a Tu Turno Web</p>
    <a routerLink="/registro" class="boton-principal">Registrarse</a>
  </div>
</header>

<main>
  <section class="recuperar-contrasena">
    <div class="contenedor">
      <h2>Recuperar contraseña</h2>
      <form [formGroup]="formularioRecuperar" (ngSubmit)="enviarCorreo()">
        <div class="mb-3">
          <label class="form-label">Correo</label>
          <input type="text" class="form-control" formControlName="correo" placeholder="ejemplo@example.cl"
            [class.is-invalid]="formularioRecuperar.get('correo')?.invalid && formularioRecuperar.get('correo')?.touched">
          <div class="invalid-feedback">
            <span *ngIf="formularioRecuperar.get('correo')?.errors?.['required']">El correo es obligatorio</span>
            <span *ngIf="formularioRecuperar.get('correo')?.errors?.['email']">El correo no tiene formato válido</span>
          </div>
        </div>
        <div class="alert alert-success" *ngIf="mensajeExito">{{ mensajeExito }}</div>
        <button type="submit" class="btn btn-primary">Enviar correo</button>
      </form>
    </div>
  </section>
</main>

<footer class="pie-pagina">
  <p>© 2026 Tu turno Web — Ejemplo académico DSY2202</p>
</footer>
