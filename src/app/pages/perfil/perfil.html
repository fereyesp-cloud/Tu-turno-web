<header class="encabezado" id="perfil">
  <div class="contenedor encabezado-contenido">
    <h1>Mi perfil - Tu turno web</h1>
    <p>Bienvenido</p>
  </div>
</header>

<app-navbar></app-navbar>

<main>
  <section class="seccion perfil">
    <div class="contenedor">
      <form [formGroup]="formularioPerfil" (ngSubmit)="guardarCambios()">
        <div class="mb-3">
          <label class="form-label">Nombre completo</label>
          <input type="text" class="form-control" formControlName="nombre"
            [class.is-invalid]="formularioPerfil.get('nombre')?.invalid && formularioPerfil.get('nombre')?.touched">
          <div class="invalid-feedback">El nombre es obligatorio</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Nombre de usuario</label>
          <input type="text" class="form-control" formControlName="nombreUsuario"
            [class.is-invalid]="formularioPerfil.get('nombreUsuario')?.invalid && formularioPerfil.get('nombreUsuario')?.touched">
          <div class="invalid-feedback">El nombre de usuario es obligatorio</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Correo</label>
          <input type="text" class="form-control" formControlName="correo"
            [class.is-invalid]="formularioPerfil.get('correo')?.invalid && formularioPerfil.get('correo')?.touched">
          <div class="invalid-feedback">
            <span *ngIf="formularioPerfil.get('correo')?.errors?.['required']">El correo es obligatorio</span>
            <span *ngIf="formularioPerfil.get('correo')?.errors?.['email']">El correo no tiene formato válido</span>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Fecha de nacimiento</label>
          <input type="date" class="form-control" formControlName="fechaNacimiento"
            [class.is-invalid]="formularioPerfil.get('fechaNacimiento')?.invalid && formularioPerfil.get('fechaNacimiento')?.touched">
          <div class="invalid-feedback">
            <span *ngIf="formularioPerfil.get('fechaNacimiento')?.errors?.['required']">La fecha es obligatoria</span>
            <span *ngIf="formularioPerfil.get('fechaNacimiento')?.errors?.['menorEdad']">Debes tener al menos 13 años</span>
          </div>
        </div>
        <div class="alert alert-success mt-3" *ngIf="mensajeExito">{{ mensajeExito }}</div>
        <button type="submit" class="btn btn-primary">Guardar cambios</button>
      </form>
    </div>
  </section>
</main>

<footer class="pie-pagina">
  <p>© 2026 Tu turno Web — Ejemplo académico DSY2202</p>
</footer>
